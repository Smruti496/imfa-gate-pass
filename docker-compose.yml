name: imfa-gatepass

services:
  api:
    build:
      context: ./imfa-gate-pass-api
      dockerfile: Dockerfile
    container_name: imfa-gatepass-api
    restart: unless-stopped
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SPRING_PROFILES_ACTIVE=prod
      - APP_CORS_ALLOWED_ORIGINS=http://localhost:5002,https://demo.unitysphere.site:5002,https://demo.unitysphere.site:5003
      - APP_BASE_URL=http://localhost:5002
      - CHECKIN_WEBHOOK_ENABLED=true
      - CHECKIN_WEBHOOK_URL=https://whatsapp.bipros.com:7272/api/v1/webhook/gatepass-update
    expose:
      - "8080"
    networks:
      - imfa-gatepass
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/dashboard/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: ./imfa-gate-pass-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: imfa-gatepass-ui
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - imfa-gatepass
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: imfa-gatepass-nginx
    restart: unless-stopped
    ports:
      - "5002:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - imfa-gatepass
    depends_on:
      - api
      - ui

networks:
  imfa-gatepass:
    name: imfa-gatepass
    driver: bridge
