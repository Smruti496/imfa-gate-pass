services:
  api:
    build:
      context: ./imfa-gate-pass-api
      dockerfile: Dockerfile
    container_name: imfa-gatepass-api
    restart: unless-stopped
    environment:
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - SPRING_PROFILES_ACTIVE=prod
      - APP_CORS_ALLOWED_ORIGINS=http://localhost
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/dashboard/stats || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: ./imfa-gate-pass-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: imfa-gatepass-ui
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: imfa-gatepass-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - ui
