spring.application.name=imfa-gatepass-api

# --- Database (set via .env or environment variables) ---
# Local dev:  DB_URL=jdbc:postgresql://localhost:5433/imfa_gate_pass
# Docker:     DB_URL=jdbc:postgresql://host.docker.internal:5433/imfa_gate_pass
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA (do NOT let Hibernate touch the schema) ---
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Server ---
server.port=8080

# --- CORS ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# --- Public base URL (used to build PDF links) ---
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Checkin Webhook (optional integration) ---
app.checkin.webhook.enabled=${CHECKIN_WEBHOOK_ENABLED:false}
app.checkin.webhook.url=${CHECKIN_WEBHOOK_URL:}

# --- Checkin Email (optional integration) ---
app.checkin.email.enabled=${CHECKIN_EMAIL_ENABLED:false}
app.checkin.email.from=${CHECKIN_EMAIL_FROM:noreply@imfa.com}

# --- SMTP (required when email enabled) ---
spring.mail.host=${MAIL_HOST:smtp.office365.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
